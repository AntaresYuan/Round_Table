services:
  postgres:
    image: postgres:16-alpine
    container_name: roundtable-postgres
    environment:
      POSTGRES_USER: roundtable
      POSTGRES_PASSWORD: roundtable
      POSTGRES_DB: roundtable
    ports:
      - "${ROUNDTABLE_POSTGRES_PORT:-5432}:5432"
    volumes:
      - roundtable-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roundtable -d roundtable"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  roundtable-postgres-data:
